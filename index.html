<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>방장산 식물 도감</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { -webkit-tap-highlight-color: transparent; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
  </style>
</head>
<body class="bg-[#F4F8F5]">
  <div id="root">
    <div class="min-h-screen flex flex-col items-center justify-center text-emerald-600 gap-4">
      <i class="ph ph-spinner animate-spin text-5xl"></i>
      <p class="font-bold">도감을 준비하고 있어요...</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // 파이어베이스 설정
    const firebaseConfig = {
      apiKey: "AIzaSyCZjnNVl9MkH2nqQ9O0vhKibiwGl-0ysRU",
      authDomain: "plant-book-84803.firebaseapp.com",
      projectId: "plant-book-84803",
      storageBucket: "plant-book-84803.firebasestorage.app",
      messagingSenderId: "76598088689",
      appId: "1:76598088689:web:334a3735566fa37c01aa50",
      measurementId: "G-ZYMY9HW5CT"
    };

    const app = initializeApp(firebaseConfig);
    window.firebaseAuth = getAuth(app);
    window.firebaseDb = getFirestore(app);
    window.firebaseMethods = {
      signInAnonymously, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut,
      collection, addDoc, onSnapshot, deleteDoc, doc
    };
    window.dispatchEvent(new Event('firebaseReady'));
  </script>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    function App() {
      const auth = window.firebaseAuth;
      const db = window.firebaseDb;
      const { signInAnonymously, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, collection, addDoc, onSnapshot, deleteDoc, doc } = window.firebaseMethods;
      const appId = "plant-book-84803";

      const [user, setUser] = useState(null);
      const [currentTab, setCurrentTab] = useState('camera');
      
      const [selectedImage, setSelectedImage] = useState(null);
      const [compressedImageUrl, setCompressedImageUrl] = useState(null);
      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const [result, setResult] = useState(null);
      const [error, setError] = useState(null);
      
      const cameraInputRef = useRef(null);
      const albumInputRef = useRef(null);

      const [plants, setPlants] = useState([]);
      const [isSaving, setIsSaving] = useState(false);
      const [saveSuccess, setSaveSuccess] = useState(false);
      const [visibleCount, setVisibleCount] = useState(10);

      const [showLoginModal, setShowLoginModal] = useState(false);
      const [loginId, setLoginId] = useState('');
      const [loginPassword, setLoginPassword] = useState('');
      const [authError, setAuthError] = useState('');
      const DUMMY_DOMAIN = "@plant.local"; 
      const [showImageSourceModal, setShowImageSourceModal] = useState(false);

      // 발급받으신 플랜트넷 API 키 적용
      const plantNetApiKey = "2b10Xd7k9obw7ZFJzVTET8O";

      useEffect(() => {
        const initAuth = async () => {
          try { await signInAnonymously(auth); } catch (err) { console.error("인증 실패:", err); }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return;
        const plantsRef = collection(db, 'artifacts', appId, 'users', user.uid, 'plants');
        const unsubscribe = onSnapshot(plantsRef, (snapshot) => {
          const plantData = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
          plantData.sort((a, b) => b.createdAt - a.createdAt);
          setPlants(plantData);
        }, (err) => { console.error("도감 불러오기 오류:", err); });
        return () => unsubscribe();
      }, [user]);

      const handleSignUp = async () => {
        if (!loginId || loginPassword.length < 6) return setAuthError("아이디와 6자리 이상 비밀번호를 입력해주세요.");
        try {
          const fakeEmail = `${loginId}${DUMMY_DOMAIN}`;
          await createUserWithEmailAndPassword(auth, fakeEmail, loginPassword);
          setShowLoginModal(false); setLoginId(''); setLoginPassword('');
        } catch (err) { setAuthError("가입에 실패했습니다."); }
      };

      const handleLogin = async () => {
        if (!loginId || loginPassword.length < 6) return setAuthError("입력을 확인해주세요.");
        try {
          await signInWithEmailAndPassword(auth, `${loginId}${DUMMY_DOMAIN}`, loginPassword);
          setShowLoginModal(false); setLoginId(''); setLoginPassword('');
        } catch (err) { setAuthError("정보가 틀렸습니다."); }
      };

      const handleLogout = async () => {
        try { await signOut(auth); await signInAnonymously(auth); } catch (err) {}
      };

      // 이미지 압축 데이터를 Blob(파일 형태)으로 변환하는 함수
      const dataURItoBlob = (dataURI) => {
        const byteString = atob(dataURI.split(',')[1]);
        const mimeString = dataURI.split(',')[0].split(':')[1].split(';')[0];
        const ab = new ArrayBuffer(byteString.length);
        const ia = new Uint8Array(ab);
        for (let i = 0; i < byteString.length; i++) {
          ia[i] = byteString.charCodeAt(i);
        }
        return new Blob([ab], { type: mimeString });
      };

      // 이미지 용량 압축 함수
      const compressImage = (file) => {
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
              const canvas = document.createElement('canvas');
              let { width, height } = img;
              if (width > height && width > 600) { height *= 600 / width; width = 600; } 
              else if (height > 600) { width *= 600 / height; height = 600; }
              canvas.width = width; canvas.height = height;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, width, height);
              resolve(canvas.toDataURL('image/jpeg', 0.7)); // 품질 70%로 압축
            };
          };
        });
      };

      const handleImageChange = async (e) => {
        const file = e.target.files[0];
        if (file) {
          if (selectedImage) URL.revokeObjectURL(selectedImage);
          setSelectedImage(URL.createObjectURL(file));
          setResult(null); setError(null); setSaveSuccess(false);
          const compressedDataUrl = await compressImage(file);
          setCompressedImageUrl(compressedDataUrl);
        }
      };

      // 💡 플랜트넷 API 식물 분석 기능
      const analyzePlant = async () => {
        if (!compressedImageUrl || isAnalyzing) return; 

        setIsAnalyzing(true);
        setError(null);

        try {
          const formData = new FormData();
          const imageBlob = dataURItoBlob(compressedImageUrl);
          formData.append('images', imageBlob, 'plant.jpg');
          formData.append('organs', 'auto'); 

          const url = `https://my-api.plantnet.org/v2/identify/all?api-key=${plantNetApiKey}&lang=ko`;

          const response = await fetch(url, {
            method: 'POST',
            body: formData
          });

          if (!response.ok) {
            if (response.status === 404) {
              throw new Error("사진에서 식물을 찾지 못했어요. 식물 잎이나 꽃이 잘 보이게 다시 찍어주세요!");
            } else if (response.status === 401 || response.status === 403) {
              throw new Error("서버 접속 권한이 없습니다. (플랜트넷 이메일 인증을 확인하거나 API 키를 확인해주세요)");
            }
            throw new Error(`(${response.status}) 일시적인 서버 통신 오류가 발생했어요.`);
          }

          const data = await response.json();

          if (data && data.results && data.results.length > 0) {
            const bestMatch = data.results[0];
            const accuracy = Math.round(bestMatch.score * 100);
            
            const plantName = (bestMatch.species.commonNames && bestMatch.species.commonNames.length > 0) 
                              ? bestMatch.species.commonNames[0] 
                              : bestMatch.species.scientificNameWithoutAuthor;

            setResult({
              name: plantName,
              description: `이 식물은 약 ${accuracy}% 확률로 '${plantName}'입니다! 포이와 함께 도감에 보관해 볼까요?`
            });
          } else {
            throw new Error("어떤 식물인지 정확히 찾지 못했어요.");
          }
        } catch (err) {
          console.error("PlantNet Error:", err); 
          // 💡 에러 메시지를 더욱 친절하고 정확하게 안내하도록 개선했습니다.
          if (err.message.includes("Failed to fetch") || err.message.includes("NetworkError")) {
            setError("분석 실패: 보안 제한(CORS)으로 차단되었습니다. 미리보기 창이 아닌 깃허브나 Netlify에 배포된 실제 주소에서 테스트해주세요!");
          } else {
            setError(`분석 실패: ${err.message}`);
          }
        } finally {
          setIsAnalyzing(false);
        }
      };

      const saveToDictionary = async () => {
        if (!user || !result || !compressedImageUrl || isSaving) return; 
        setIsSaving(true);
        try {
          const plantsRef = collection(db, 'artifacts', appId, 'users', user.uid, 'plants');
          await addDoc(plantsRef, {
            name: result.name,
            description: result.description,
            imageData: compressedImageUrl,
            createdAt: Date.now()
          });
          setSaveSuccess(true);
        } catch (err) { setError("저장 실패"); } finally { setIsSaving(false); }
      };

      const deletePlant = async (id) => {
        if (!user) return;
        try { await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'plants', id)); } catch (err) {}
      };

      const resetApp = () => {
        if (selectedImage) URL.revokeObjectURL(selectedImage); 
        setSelectedImage(null); setCompressedImageUrl(null); setResult(null); setError(null); setSaveSuccess(false);
        if (cameraInputRef.current) cameraInputRef.current.value = "";
        if (albumInputRef.current) albumInputRef.current.value = "";
      };

      const handleModalBackgroundClick = (e) => {
        if (e.target === e.currentTarget) {
          setShowImageSourceModal(false);
        }
      };

      return (
        <div className="min-h-screen bg-[#F4F8F5] text-slate-800 font-sans selection:bg-emerald-200 pb-28">
          <header className="bg-white/80 backdrop-blur-md shadow-sm px-5 py-3 sticky top-0 z-10 border-b border-slate-100">
            <div className="max-w-md mx-auto flex items-center justify-between gap-2">
              <div className="flex items-center">
                <img src="국립장성숲체원-_국문좌우_이미지형 (1).png" alt="국립장성숲체원 로고" className="h-10 object-contain drop-shadow-sm" />
              </div>
              
              {user && !user.isAnonymous ? (
                <div className="flex items-center gap-2">
                  <span className="text-[11px] font-bold text-emerald-700 bg-emerald-50 px-2.5 py-1 rounded-md border border-emerald-100">
                    {user.email?.split('@')[0]}님
                  </span>
                  <button onClick={handleLogout} className="flex items-center gap-1.5 text-xs bg-white hover:bg-slate-50 text-slate-600 px-3 py-1.5 rounded-full font-semibold transition-colors border border-slate-200 shadow-sm">
                    <i class="ph ph-sign-out text-sm"></i> 로그아웃
                  </button>
                </div>
              ) : (
                <button onClick={() => { setShowLoginModal(true); setAuthError(''); }} className="flex items-center gap-1.5 text-xs bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-1.5 rounded-full font-semibold transition-all shadow-md shadow-emerald-600/20">
                  <i class="ph ph-sign-in text-sm"></i> 로그인
                </button>
              )}
            </div>
          </header>

          <main className="max-w-md mx-auto p-5 mt-2">
            {currentTab === 'camera' && (
              <div className="flex flex-col gap-6 animate-in fade-in duration-500">
                {!result && !isAnalyzing && !selectedImage && (
                  <div className="text-center space-y-4 py-6 relative">
                    <div className="relative inline-block">
                      <div className="absolute inset-0 bg-emerald-300 blur-3xl opacity-20 rounded-full transform scale-150"></div>
                      <img src="01.관찰포이_봄.png" alt="관찰하는 포이" className="w-40 h-40 mx-auto relative z-10 drop-shadow-xl animate-bounce" style={{ animationDuration: '3s' }} />
                    </div>
                    <div>
                      <h2 className="text-2xl font-extrabold text-slate-800 tracking-tight">식물을 발견했나요?</h2>
                      <p className="text-slate-500 mt-1.5 text-sm font-medium">포이와 함께 사진을 찍어 식물을 알아보세요!</p>
                    </div>
                  </div>
                )}

                {error && (
                  <div className="bg-red-50 text-red-600 p-4 rounded-2xl flex items-start gap-3 border border-red-100 shadow-sm animate-in fade-in">
                    <i class="ph ph-warning-circle text-xl shrink-0 mt-0.5"></i>
                    <p className="text-sm font-bold leading-relaxed break-keep">{error}</p>
                  </div>
                )}

                <div className="bg-white p-2.5 rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
                  {!selectedImage ? (
                    <div onClick={() => setShowImageSourceModal(true)} className="border-2 border-dashed border-emerald-200 bg-emerald-50/30 rounded-[1.5rem] h-80 flex flex-col items-center justify-center gap-5 cursor-pointer hover:bg-emerald-50 active:scale-[0.98] transition-all group">
                      <div className="w-16 h-16 bg-white rounded-2xl flex items-center justify-center shadow-sm text-emerald-500 group-hover:scale-110 group-hover:rotate-3 transition-transform duration-300">
                        <i class="ph ph-camera text-3xl"></i>
                      </div>
                      <div className="text-center">
                        <span className="block text-lg font-bold text-emerald-900 mb-1">카메라 켜기 / 앨범 선택</span>
                        <span className="text-sm text-emerald-600/70 font-medium">여기를 가볍게 터치하세요</span>
                      </div>
                    </div>
                  ) : (
                    <div className="relative rounded-[1.5rem] overflow-hidden shadow-inner">
                      <img src={selectedImage} alt="Selected Plant" className="w-full h-80 object-cover" />
                      {isAnalyzing && (
                        <div className="absolute inset-0 bg-white/80 backdrop-blur-md flex flex-col items-center justify-center gap-4 z-10">
                          <i class="ph ph-spinner animate-spin text-5xl text-emerald-600"></i>
                          <p className="text-lg font-bold text-emerald-800 animate-pulse">식물 박사님이 확인 중...</p>
                        </div>
                      )}
                    </div>
                  )}
                  <input type="file" accept="image/*" capture="environment" onChange={handleImageChange} ref={cameraInputRef} className="hidden" />
                  <input type="file" accept="image/*" onChange={handleImageChange} ref={albumInputRef} className="hidden" />
                </div>

                {selectedImage && !result && !isAnalyzing && (
                  <div className="flex gap-3">
                    <button onClick={resetApp} className="flex-1 py-4 bg-white border border-slate-200 text-slate-600 font-bold rounded-2xl hover:bg-slate-50 active:bg-slate-100 shadow-sm transition-all">
                      다시 찍기
                    </button>
                    <button onClick={analyzePlant} className="flex-[2] py-4 bg-emerald-600 text-white font-bold rounded-2xl hover:bg-emerald-700 active:bg-emerald-800 shadow-lg shadow-emerald-600/30 flex items-center justify-center gap-2 transition-all">
                      <i class="ph ph-leaf text-xl"></i> 이름 확인하기
                    </button>
                  </div>
                )}

                {result && (
                  <div className="animate-in fade-in space-y-4">
                    <div className="bg-white p-7 rounded-[2rem] shadow-sm border border-emerald-100 space-y-4 relative overflow-hidden">
                      <div className="absolute top-0 right-0 w-32 h-32 bg-emerald-50 rounded-bl-full -z-10 opacity-60"></div>
                      <div className="inline-block px-3.5 py-1.5 bg-emerald-100 text-emerald-800 text-xs font-black rounded-full mb-2 tracking-wide">
                        인식 완료 ✨
                      </div>
                      <h3 className="text-3xl font-black text-slate-800 break-keep leading-tight">{result.name}</h3>
                      <p className="text-slate-600 leading-relaxed text-lg break-keep font-medium">{result.description}</p>
                    </div>

                    <div className="flex gap-3">
                      <button onClick={resetApp} className="flex-1 py-4 bg-white border border-slate-200 text-slate-700 font-bold rounded-2xl flex items-center justify-center gap-2 hover:bg-slate-50 shadow-sm transition-all">
                        <i class="ph ph-arrows-clockwise text-xl"></i> 다시
                      </button>
                      {saveSuccess ? (
                        <button disabled className="flex-[2] py-4 bg-emerald-50 border border-emerald-200 text-emerald-700 font-bold rounded-2xl flex items-center justify-center gap-2 cursor-not-allowed">
                          <i class="ph ph-check-circle text-xl"></i> 저장 완료
                        </button>
                      ) : (
                        <button onClick={saveToDictionary} disabled={isSaving} className="flex-[2] py-4 bg-slate-800 text-white font-bold rounded-2xl hover:bg-slate-900 active:bg-black shadow-lg flex items-center justify-center gap-2 disabled:opacity-70 transition-all">
                          {isSaving ? <i class="ph ph-spinner animate-spin text-xl"></i> : <i class="ph ph-floppy-disk text-xl"></i>}
                          내 도감에 저장
                        </button>
                      )}
                    </div>
                  </div>
                )}
              </div>
            )}

            {currentTab === 'dictionary' && (
              <div className="animate-in fade-in duration-300">
                <div className="flex items-center justify-between mb-6">
                  <h2 className="text-2xl font-black text-slate-800 flex items-center gap-2.5">
                    <i class="ph ph-book-open text-3xl text-emerald-600"></i> 나의 식물 기록
                  </h2>
                  <span className="text-sm bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full font-bold shadow-sm">
                    총 {plants.length}개
                  </span>
                </div>

                {plants.length === 0 ? (
                  <div className="text-center py-20 bg-white rounded-[2rem] border border-dashed border-emerald-200 shadow-sm relative overflow-hidden">
                    <div className="absolute inset-0 bg-emerald-50/30"></div>
                    <img src="01.관찰포이_봄.png" alt="관찰하는 포이" className="w-32 h-32 mx-auto relative z-10 drop-shadow-md opacity-80 mb-4" />
                    <p className="text-slate-700 font-bold text-lg relative z-10">아직 수집한 식물이 없어요.</p>
                    <p className="text-slate-500 text-sm mt-1.5 font-medium relative z-10">포이와 함께 카메라로 도감을 채워보세요!</p>
                  </div>
                ) : (
                  <div className="space-y-6">
                    <div className="grid grid-cols-2 gap-4">
                      {plants.slice(0, visibleCount).map((plant) => (
                        <div key={plant.id} className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden flex flex-col relative group hover:shadow-md transition-shadow">
                          <div className="relative h-36">
                            <img src={plant.imageData} alt={plant.name} className="w-full h-full object-cover bg-slate-100" />
                            <div className="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                            <button onClick={() => deletePlant(plant.id)} className="absolute top-2 right-2 p-2 bg-black/30 backdrop-blur-md text-white rounded-full hover:bg-red-500 transition-colors opacity-0 group-hover:opacity-100">
                              <i class="ph ph-trash text-base"></i>
                            </button>
                          </div>
                          <div className="p-4 flex-1 flex flex-col">
                            <h4 className="font-extrabold text-slate-800 text-sm truncate">{plant.name}</h4>
                            <p className="text-[11px] font-semibold text-slate-400 mt-1">
                              {new Date(plant.createdAt).toLocaleDateString()}
                            </p>
                          </div>
                        </div>
                      ))}
                    </div>
                    {plants.length > visibleCount && (
                      <button onClick={() => setVisibleCount(p => p + 10)} className="w-full py-3.5 bg-white border border-emerald-200 text-emerald-700 font-bold rounded-2xl hover:bg-emerald-50 transition-colors shadow-sm">
                        더 보기 ({visibleCount} / {plants.length})
                      </button>
                    )}
                  </div>
                )}
              </div>
            )}
          </main>

          <nav className="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-lg border-t border-slate-200 pb-safe z-20">
            <div className="max-w-md mx-auto flex">
              <button onClick={() => setCurrentTab('camera')} className={`flex-1 py-4 flex flex-col items-center gap-1.5 transition-colors relative ${currentTab === 'camera' ? 'text-emerald-600' : 'text-slate-400 hover:text-slate-600'}`}>
                {currentTab === 'camera' && <div className="absolute top-0 left-1/2 -translate-x-1/2 w-8 h-1 bg-emerald-500 rounded-b-full"></div>}
                <i class={`ph ph-camera text-2xl ${currentTab === 'camera' ? 'fill-emerald-50' : ''}`}></i>
                <span className="text-[11px] font-bold tracking-wide">사진 찍기</span>
              </button>
              <button onClick={() => { setCurrentTab('dictionary'); resetApp(); }} className={`flex-1 py-4 flex flex-col items-center gap-1.5 transition-colors relative ${currentTab === 'dictionary' ? 'text-emerald-600' : 'text-slate-400 hover:text-slate-600'}`}>
                {currentTab === 'dictionary' && <div className="absolute top-0 left-1/2 -translate-x-1/2 w-8 h-1 bg-emerald-500 rounded-b-full"></div>}
                <i class={`ph ph-book-open text-2xl ${currentTab === 'dictionary' ? 'fill-emerald-50' : ''}`}></i>
                <span className="text-[11px] font-bold tracking-wide">내 도감</span>
              </button>
            </div>
          </nav>

          {/* 사진 선택 모달 (배경 클릭 시 닫힘 기능 적용) */}
          {showImageSourceModal && (
            <div 
              className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center p-0 sm:p-5"
              onClick={handleModalBackgroundClick}
            >
              <div className="bg-white rounded-t-[2rem] sm:rounded-[2.5rem] w-full max-w-sm p-6 space-y-4 shadow-2xl animate-in slide-in-from-bottom-10 sm:zoom-in-95 duration-200 pb-safe">
                <div className="text-center mb-4">
                  <h3 className="text-xl font-black text-slate-800">사진 가져오기</h3>
                  <p className="text-sm text-slate-500 font-medium mt-1">어떤 방법으로 식물 사진을 올릴까요?</p>
                </div>
                <button onClick={() => { cameraInputRef.current?.click(); setShowImageSourceModal(false); }} className="w-full py-4 bg-emerald-50 text-emerald-700 font-bold rounded-2xl flex items-center justify-center gap-3 hover:bg-emerald-100 border border-emerald-100">
                  <i class="ph ph-camera text-2xl"></i> 카메라로 찍기
                </button>
                <button onClick={() => { albumInputRef.current?.click(); setShowImageSourceModal(false); }} className="w-full py-4 bg-slate-50 text-slate-700 font-bold rounded-2xl flex items-center justify-center gap-3 hover:bg-slate-100 border border-slate-200">
                  <i class="ph ph-images text-2xl"></i> 앨범에서 선택
                </button>
                <button onClick={() => setShowImageSourceModal(false)} className="w-full py-4 text-slate-400 font-bold rounded-2xl hover:bg-slate-50 mt-2">취소</button>
              </div>
            </div>
          )}

          {showLoginModal && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-5">
              <div className="bg-white rounded-[2.5rem] w-full max-w-sm p-7 space-y-6 shadow-2xl">
                <div className="text-center">
                  <div className="w-14 h-14 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner">
                    <i class="ph ph-leaf text-3xl"></i>
                  </div>
                  <h3 className="text-2xl font-black text-slate-800 tracking-tight">도감 시작하기</h3>
                  <p className="text-sm text-slate-500 mt-2 font-medium break-keep">아이디와 비밀번호만으로 간편하게 도감을 보관하세요!</p>
                </div>
                <div className="space-y-3.5">
                  <div className="space-y-1.5">
                    <label className="text-xs font-bold text-slate-600 pl-1">아이디</label>
                    <input type="text" placeholder="영문, 숫자 입력" value={loginId} onChange={(e) => setLoginId(e.target.value)} className="w-full px-5 py-3.5 rounded-2xl border border-slate-200 bg-slate-50 font-medium outline-none focus:border-emerald-500" />
                  </div>
                  <div className="space-y-1.5">
                    <label className="text-xs font-bold text-slate-600 pl-1">비밀번호</label>
                    <input type="password" placeholder="6자리 이상 입력" value={loginPassword} onChange={(e) => setLoginPassword(e.target.value)} className="w-full px-5 py-3.5 rounded-2xl border border-slate-200 bg-slate-50 font-medium outline-none focus:border-emerald-500" />
                  </div>
                  {authError && <p className="text-red-500 text-xs px-2 font-bold">{authError}</p>}
                </div>
                <div className="flex flex-col gap-2.5 pt-2">
                  <div className="flex gap-2.5">
                    <button onClick={handleSignUp} className="flex-1 py-3.5 bg-emerald-50 text-emerald-700 font-black rounded-2xl hover:bg-emerald-100">새로 가입</button>
                    <button onClick={handleLogin} className="flex-1 py-3.5 bg-emerald-600 text-white font-black rounded-2xl hover:bg-emerald-700 shadow-lg">로그인</button>
                  </div>
                  <button onClick={() => setShowLoginModal(false)} className="w-full py-3.5 bg-white text-slate-400 font-bold rounded-2xl hover:bg-slate-50">닫기</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const startApp = () => {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    };
    if (window.firebaseAuth) startApp(); else window.addEventListener('firebaseReady', startApp);
  </script>
</body>
</html>
