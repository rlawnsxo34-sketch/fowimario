<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포이와 마리의 숲속 치유 탐험</title>
    
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    
    <style>
        /* 2. 게임 화면을 브라우저 중앙에 배치하고 배경을 설정합니다. */
        body {
            margin: 0;
            padding: 0;
            background-color: #e8f5e9; /* 숲의 느낌을 주는 연그린 배경 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
        }

        /* 게임 화면 테두리에 부드러운 그림자 효과 */
        canvas {
            box-shadow: 0 10px 30px rgba(0, 77, 64, 0.2);
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <script src="main.js"></script>
